spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_spring}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

    show-sql: true