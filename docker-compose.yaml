services:
  db:
    image: postgres:17-alpine
    container_name: postgres_auth
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: auth_spring
    volumes:
      - auth_spring_data:/var/lib/postgresql/data

volumes:
  auth_spring_data: